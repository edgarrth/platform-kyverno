apiVersion: apps/v1
kind: Deployment
metadata:
  name: shippingservice
  labels:
    app: shippingservice
spec:
  selector:
    matchLabels:
      app: shippingservice
  template:
    metadata:
      labels:
        app: shippingservice
      annotations:
        instrumentation.opentelemetry.io/inject-sdk: 'true'
        instrumentation.opentelemetry.io/inject-into-containers: server
    spec:
      serviceAccountName: shippingservice
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 0
        runAsNonRoot: false
      nodeSelector:
        node: workloads
      containers:
      - name: server
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
        image: wjma90/demo-shippingservice
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50051
        env:
        - name: PORT
          value: '50051'
        - name: DISABLE_PROFILER
          value: '1'
        - name: ENABLE_TRACING
          value: '1'
        - name: ENABLE_METRICS
          value: '1'
        - name: ENABLE_LOGS
          value: '1'
        readinessProbe:
          periodSeconds: 5
          grpc:
            port: 50051
        livenessProbe:
          grpc:
            port: 50051
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 1
            memory: 512Mi
